<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../styles/bootstrap.css" />

    <!-- Start: Bottom Menu Script/Style-->
    <link rel="stylesheet" href="../styles/menu-bar-bottom-style.css" />
    <script defer src="../scripts/menu-bar-bottom.js"></script>
    <!-- End: Bottom Menu Script/Style-->

    <title>Order Form</title>
  </head>

  <body>
    <h1 class="form text-primary text-center">Order</h1>
    <div class="container">
      <form novalidate>
        <!-- Name -->
        <div class="form-floating">
          <input
            type="text"
            id="name"
            class="form-control"
            placeholder="Firstname Lastname"
            required
          />
          <label for="name" class="form-label">Name</label>
          <div class="invalid-feedback">Invalid</div>
          <div class="valid-feedback">Valid</div>
        </div>

        <!-- telephone -->
        <div class="form-floating">
          <input
            type="tel"
            id="tel"
            class="form-control"
            placeholder="xxx-xxxxxxx"
            required
          />
          <label for="telefon" class="form-label">Phone number</label>
          <div class="invalid-feedback">Invalid tel</div>
          <div class="valid-feedback">Valid tel</div>
        </div>

        <!-- Email -->
        <div class="form-floating">
          <input
            type="email"
            id="email"
            class="form-control"
            placeholder="email"
            required
          />
          <label for="email" class="form-label">Email</label>
          <div class="invalid-feedback">Invalid email</div>
          <div class="valid-feedback">Valid email</div>
        </div>

        <!-- address -->
        <div class="form-floating">
          <textarea
            name="message"
            rows="5"
            class="form-control"
            cols="30"
            placeholder="Adress"
            required
          ></textarea>
          <label for="message" class="form-label">Delivery adress</label>
        </div>

        <button>Submit</button>
      </form>
    </div>

    <!-- Menu Bar Bottom -->
    <!-- infoga footer.html på något sätt -->
  </body>
</html>
